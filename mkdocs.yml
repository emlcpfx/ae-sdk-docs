site_name: AE Plugin SDK Community Docs
site_description: Community-maintained documentation for After Effects C++ plugin development
site_url: https://emlcpfx.github.io/ae-sdk-docs/
repo_url: https://github.com/emlcpfx/ae-sdk-docs
repo_name: ae-sdk-docs
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.action.edit
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

plugins:
  - search:
      separator: '[\s\-\._]+'
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.snippets

extra:
  homepage: /ae-sdk-docs/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/emlcpfx/ae-sdk-docs
    - icon: fontawesome/brands/discord
      link: https://discord.gg/your-invite-here

